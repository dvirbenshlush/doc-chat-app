<div class="chat-container">
  <div class="messages" #messageContainer>
    <div *ngIf="messages.length === 0" class="empty-state">
      <mat-icon>chat_bubble_outline</mat-icon>
      <p>Ask anything about the guides on the left</p>
    </div>

    <div
      *ngFor="let msg of messages"
      class="message-wrapper"
      [class.user]="msg.role === 'user'"
      [class.assistant]="msg.role === 'assistant'"
    >
      <div class="bubble">
        <div *ngIf="msg.route === 'sql'" class="route-badge sql-badge">
          <mat-icon>storage</mat-icon> SQL
        </div>
        <div *ngIf="msg.route === 'docs'" class="route-badge docs-badge">
          <mat-icon>description</mat-icon> Docs
        </div>

        <p class="content">{{ msg.content }}</p>

        <div *ngIf="msg.sql_query" class="sql-panel">
          <mat-expansion-panel>
            <mat-expansion-panel-header>
              <mat-panel-title>Generated SQL</mat-panel-title>
            </mat-expansion-panel-header>
            <pre class="sql-code">{{ msg.sql_query }}</pre>
          </mat-expansion-panel>
        </div>

        <div *ngIf="msg.results && msg.results.length > 0" class="results-panel">
          <mat-expansion-panel>
            <mat-expansion-panel-header>
              <mat-panel-title>Results ({{ msg.results.length }} rows)</mat-panel-title>
            </mat-expansion-panel-header>
            <div class="table-wrapper">
              <table class="results-table">
                <thead>
                  <tr>
                    <th *ngFor="let col of getColumns(msg.results)">{{ col }}</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let row of msg.results">
                    <td *ngFor="let col of getColumns(msg.results)">{{ row[col] }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </mat-expansion-panel>
        </div>

        <div *ngIf="msg.sources && msg.sources.length > 0" class="sources">
          <mat-expansion-panel>
            <mat-expansion-panel-header>
              <mat-panel-title>Sources ({{ msg.sources.length }})</mat-panel-title>
            </mat-expansion-panel-header>
            <div *ngFor="let src of msg.sources" class="source-item">
              <span class="source-doc">{{ src.doc }}</span>
              <p class="source-excerpt">{{ src.excerpt }}</p>
            </div>
          </mat-expansion-panel>
        </div>
      </div>
    </div>

    <div *ngIf="isLoading" class="message-wrapper assistant">
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <mat-form-field appearance="outline" class="input-field">
      <input
        matInput
        [(ngModel)]="inputText"
        (keydown)="onKeyDown($event)"
        placeholder="Ask a question about the guides..."
        [disabled]="isLoading"
        autocomplete="off"
      />
    </mat-form-field>
    <button
      mat-fab
      color="primary"
      (click)="sendMessage()"
      [disabled]="isLoading || !inputText.trim()"
      aria-label="Send"
    >
      <mat-icon>send</mat-icon>
    </button>
  </div>
</div>
